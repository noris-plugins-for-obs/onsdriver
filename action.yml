name: 'Prepare onsdriver'
description: 'Library to test plugins for OBS Studio'
inputs:
  setup-python:
    description: 'Setup python if true'
    required: false
    default: true
    type: boolean
  python-version:
    description: 'Version of python'
    required: false
    default: '3.13'
    type: string
  obs-plugins:
    description: 'Additional plugins to install'
    required: false
    default: ''
    type: string
  config-directory:
    description: 'Directory to save the configuration after the first-time wizard'
    required: false
    default: './saved-config'
    type: string

runs:
  using: 'composite'
  steps:
    - name: 'Setup Python'
      if: ${{ inputs.setup-python }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ inputs.python-version }}

    - name: 'Install onsdriver'
      shell: bash
      run: |
        python -m pip install -e '${{ github.action_path }}'

    - name: 'Install OBS Studio'
      if: ${{ runner.os != 'Linux' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        python -m onsdriver.obsinstall

    - name: 'Install OBS Studio and plugins'
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        set -e
        pkgs=(
          obs-studio
          ui-ws-automation-for-obs
          shutdown-plugin-for-obs
          xvfb
          x11-xserver-utils
        )
        sudo add-apt-repository -y ppa:obsproject/obs-studio
        sudo add-apt-repository -y ppa:norihiro/plugins-for-obs-studio
        sudo apt update
        sudo apt install -y "${pkgs[@]}"

    - name: 'Run the first-time wizard'
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -e

        plugins_args=(${{ inputs.obs-plugins }})
        if (( ${#plugins_args[@]} > 0 )); then
          plugins_args=(--plugins "${plugins_args[@]}")
        fi

        python -m onsdriver.firsttime "${plugins_args[@]}" --save "${{ inputs.config-directory }}"
